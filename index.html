<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMC Locações — Painel Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #1E3A8A;
      --navy-hover:  #2348a8;
      --navy-dark:   #152d6e;
      --gold:        #F5A623;
      --gold-hover:  #f7b844;
      --gold-dark:   #d4891b;
      --bg:          #eef2fb;
      --surface:     #ffffff;
      --border:      #dde4f0;
      --text:        #1a202c;
      --muted:       #6b7280;
      --shadow-sm:   0 1px 4px rgba(30,58,138,.08);
      --shadow-md:   0 4px 16px rgba(30,58,138,.12);
      --shadow-lg:   0 12px 40px rgba(30,58,138,.20);
      --radius:      12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOADING BAR ─────────────────────────────────────── */
    #loadingBar {
      position: fixed; top: 0; left: 0; width: 100%; height: 3px;
      background: var(--gold); z-index: 9999;
      transform: scaleX(0); transform-origin: left;
      transition: transform .35s ease; pointer-events: none;
    }
    #loadingBar.on  { transform: scaleX(.75); }
    #loadingBar.done{ transform: scaleX(1); transition: transform .1s; }

    /* ── TOAST ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 500; max-width: 320px;
      box-shadow: var(--shadow-lg);
      transform: translateY(80px); opacity: 0;
      transition: all .28s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok  { background:#d1fae5; color:#065f46; border-left:4px solid #10b981; }
    #toast.err { background:#fee2e2; color:#991b1b; border-left:4px solid #ef4444; }

    /* ── SPINNER ─────────────────────────────────────────── */
    #spinner {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: rgba(30,58,138,.10); z-index: 9998;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #spinner.on { opacity: 1; pointer-events: all; }
    .spin-ring {
      width: 44px; height: 44px; border-radius: 50%;
      border: 4px solid rgba(30,58,138,.18);
      border-top-color: var(--navy);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HEADER ──────────────────────────────────────────── */
    .hdr {
      background: var(--navy);
      height: 68px; padding: 0 28px;
      display: flex; align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.22);
      position: sticky; top: 0; z-index: 200;
    }
    .hdr-in {
      width: 100%; max-width: 1440px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .hdr-brand { display: flex; align-items: center; gap: 14px; }
    .logo-badge {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--gold); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 19px; color: var(--navy); letter-spacing: 1px;
    }
    .brand-texts { display: flex; flex-direction: column; }
    .brand-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 22px; color: #fff; letter-spacing: .4px; line-height: 1.1;
    }
    .brand-sub { font-size: 11.5px; color: rgba(255,255,255,.55); font-weight: 400; }

    .btn-add {
      display: flex; align-items: center; gap: 7px;
      background: var(--gold); color: var(--navy);
      border: none; border-radius: 9px;
      padding: 10px 20px; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 15px; letter-spacing: .5px;
      transition: background .18s, transform .1s;
    }
    .btn-add:hover  { background: var(--gold-hover); }
    .btn-add:active { transform: scale(.97); }
    .btn-add svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── TOOLBAR ─────────────────────────────────────────── */
    .toolbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 11px 28px;
    }
    .toolbar-in {
      max-width: 1440px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 340px; }
    .search-wrap .ico {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 8px 12px 8px 36px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13.5px; font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text); outline: none;
      transition: border-color .18s;
    }
    .search-input:focus { border-color: var(--navy); }
    .sel {
      padding: 8px 13px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13.5px; font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      cursor: pointer; outline: none; transition: border-color .18s;
    }
    .sel:focus { border-color: var(--navy); }
    .badge-defect {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      background: #fee2e2; color: #991b1b;
      font-size: 13px; font-weight: 500;
    }
    .badge-defect .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }

    /* ── BOARD ───────────────────────────────────────────── */
    .board-wrap { padding: 24px 28px; max-width: 1440px; margin: 0 auto; }
    .board { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; align-items: start; }

    /* ── COLUMN ──────────────────────────────────────────── */
    .col {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
    }
    .col-head {
      padding: 15px 18px 13px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .col-head-left { display: flex; align-items: center; gap: 9px; }
    .col-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .col-retornando .col-dot { background: #f59e0b; }
    .col-disponivel .col-dot { background: #10b981; }
    .col-locada     .col-dot { background: #3b82f6; }
    .col-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 16px; letter-spacing: .6px;
      text-transform: uppercase; color: var(--navy);
    }
    .col-cnt {
      background: var(--navy); color: #fff;
      border-radius: 20px; padding: 2px 9px; font-size: 12px; font-weight: 600;
    }
    .col-body {
      padding: 12px 10px; display: flex; flex-direction: column; gap: 10px;
      min-height: 80px; border-radius: 0 0 var(--radius) var(--radius);
      transition: background .18s;
    }
    .col-body.over { background: rgba(30,58,138,.045); }
    .col-empty {
      text-align: center; padding: 22px 12px;
      color: var(--muted); font-size: 13px;
    }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 13px;
      cursor: grab; transition: box-shadow .18s, border-color .18s, transform .12s;
      user-select: none;
    }
    .card:hover { box-shadow: var(--shadow-md); border-color: var(--navy); }
    .card.dragging { opacity: .45; cursor: grabbing; transform: scale(1.03); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 17px; color: var(--navy); line-height: 1.2; flex: 1;
    }
    .card-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .cbtn {
      width: 28px; height: 28px; border: none; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .cbtn svg { width: 13px; height: 13px; }
    .cbtn-edit   { background: #eff6ff; color: var(--navy); }
    .cbtn-edit:hover   { background: #dbeafe; }
    .cbtn-del    { background: #fff1f2; color: #e11d48; }
    .cbtn-del:hover    { background: #ffe4e6; }

    /* maintenance badge */
    .mbadge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600; margin-bottom: 9px;
    }
    .mbadge::before { content:''; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .mb-ok      { background:#d1fae5; color:#065f46; }
    .mb-ok::before      { background:#10b981; }
    .mb-rev     { background:#fef3c7; color:#92400e; }
    .mb-rev::before     { background:#f59e0b; }
    .mb-def     { background:#fee2e2; color:#991b1b; }
    .mb-def::before     { background:#ef4444; }

    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
    .cfield label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); display: block; margin-bottom: 1px;
    }
    .cfield span { font-size: 13px; color: var(--text); font-weight: 500; }
    .cfield span.nil { color: var(--muted); font-style: italic; }

    /* ── MODAL ───────────────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(15,23,42,.55); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 530px;
      box-shadow: 0 28px 90px rgba(0,0,0,.28);
      transform: scale(.95) translateY(10px);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-bg.open .modal { transform: scale(1) translateY(0); }
    .modal-hd {
      padding: 20px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 22px; color: var(--navy);
    }
    .modal-x {
      width: 32px; height: 32px; border: none; background: var(--bg);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background .15s;
    }
    .modal-x:hover { background: #e2e8f0; }
    .modal-x svg { width: 15px; height: 15px; }
    .modal-bd { padding: 18px 24px; display: grid; gap: 14px; }
    .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg label {
      font-size: 11.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted);
    }
    .fg input, .fg select {
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text);
      background: #fff; outline: none; transition: border-color .18s, box-shadow .18s;
    }
    .fg input:focus, .fg select:focus {
      border-color: var(--navy); box-shadow: 0 0 0 3px rgba(30,58,138,.10);
    }
    .modal-ft {
      padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end;
    }
    .btn-cancel {
      padding: 10px 18px; background: var(--bg);
      color: var(--muted); border: 1.5px solid var(--border);
      border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; cursor: pointer; transition: background .15s;
    }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-save {
      padding: 10px 22px; background: var(--navy); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 16px; letter-spacing: .5px;
      cursor: pointer; transition: background .15s;
    }
    .btn-save:hover { background: var(--navy-hover); }

    /* ── CONFIRM DIALOG ──────────────────────────────────── */
    .confirm-bg {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(15,23,42,.55); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .confirm-bg.open { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: #fff; border-radius: 14px; padding: 24px;
      max-width: 360px; width: 100%;
      box-shadow: 0 28px 90px rgba(0,0,0,.28);
      transform: scale(.95); transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .confirm-bg.open .confirm-box { transform: scale(1); }
    .confirm-icon {
      width: 48px; height: 48px; border-radius: 50%; background: #fee2e2;
      display: flex; align-items: center; justify-content: center;
      color: #ef4444; margin-bottom: 14px;
    }
    .confirm-icon svg { width: 24px; height: 24px; }
    .confirm-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 20px; margin-bottom: 6px;
    }
    .confirm-msg { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }
    .confirm-acts { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-del-confirm {
      padding: 10px 20px; background: #ef4444; color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 15px;
      cursor: pointer; transition: background .15s;
    }
    .btn-del-confirm:hover { background: #dc2626; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 960px) { .board { grid-template-columns: 1fr; } }
    @media (max-width: 640px) {
      .hdr { padding: 0 14px; }
      .toolbar { padding: 10px 14px; }
      .board-wrap { padding: 14px; }
      .brand-sub { display: none; }
      .badge-defect { display: none; }
    }
  </style>
</head>
<body>

<!-- Loading bar -->
<div id="loadingBar"></div>

<!-- Spinner -->
<div id="spinner"><div class="spin-ring"></div></div>

<!-- Toast -->
<div id="toast"></div>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-brand">
      <div class="logo-badge">MMC</div>
      <div class="brand-texts">
        <span class="brand-name">MMC Locações</span>
        <span class="brand-sub">Controle de Plataformas Elevatórias</span>
      </div>
    </div>
    <button class="btn-add" id="btnAdd">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nova Máquina
    </button>
  </div>
</header>

<!-- ══ TOOLBAR ═════════════════════════════════════════════ -->
<div class="toolbar">
  <div class="toolbar-in">
    <div class="search-wrap">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar por nome ou cliente…">
    </div>
    <select class="sel" id="filterSel">
      <option value="">Todas as manutenções</option>
      <option value="Ok">Ok</option>
      <option value="Em revisão">Em revisão</option>
      <option value="Com defeito">Com defeito</option>
    </select>
    <div class="badge-defect">
      <span class="dot"></span>
      <span id="defectCount">0</span>&nbsp;com defeito
    </div>
  </div>
</div>

<!-- ══ BOARD ════════════════════════════════════════════════ -->
<div class="board-wrap">
  <div class="board">

    <div class="col col-retornando" id="col-Retornando">
      <div class="col-head">
        <div class="col-head-left">
          <div class="col-dot"></div>
          <span class="col-title">Retornando</span>
        </div>
        <span class="col-cnt" id="cnt-Retornando">0</span>
      </div>
      <div class="col-body" id="body-Retornando" data-col="Retornando"></div>
    </div>

    <div class="col col-disponivel" id="col-Disponível">
      <div class="col-head">
        <div class="col-head-left">
          <div class="col-dot"></div>
          <span class="col-title">Disponível</span>
        </div>
        <span class="col-cnt" id="cnt-Disponível">0</span>
      </div>
      <div class="col-body" id="body-Disponível" data-col="Disponível"></div>
    </div>

    <div class="col col-locada" id="col-Locada">
      <div class="col-head">
        <div class="col-head-left">
          <div class="col-dot"></div>
          <span class="col-title">Locada</span>
        </div>
        <span class="col-cnt" id="cnt-Locada">0</span>
      </div>
      <div class="col-body" id="body-Locada" data-col="Locada"></div>
    </div>

  </div>
</div>

<!-- ══ MODAL ADD / EDIT ═════════════════════════════════════ -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="modalTitle">Nova Máquina</span>
      <button class="modal-x" id="modalX">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-bd">
      <div class="fg">
        <label>Nome da Máquina *</label>
        <input id="fName" type="text" placeholder="Ex: Plataforma Tesoura 8m">
      </div>
      <div class="frow">
        <div class="fg">
          <label>Cliente Atual</label>
          <input id="fCurrClient" type="text" placeholder="Nome do cliente">
        </div>
        <div class="fg">
          <label>Próximo Cliente</label>
          <input id="fNextClient" type="text" placeholder="Próximo cliente">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label>Data de Retorno</label>
          <input id="fReturnDate" type="date">
        </div>
        <div class="fg">
          <label>Data Próxima Locação</label>
          <input id="fNextRentalDate" type="date">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label>Status de Manutenção</label>
          <select id="fMaintenance">
            <option value="Ok">Ok</option>
            <option value="Em revisão">Em revisão</option>
            <option value="Com defeito">Com defeito</option>
          </select>
        </div>
        <div class="fg">
          <label>Coluna</label>
          <select id="fColumn">
            <option value="Retornando">Retornando</option>
            <option value="Disponível">Disponível</option>
            <option value="Locada">Locada</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" id="modalCancel">Cancelar</button>
      <button class="btn-save"   id="modalSave">Salvar</button>
    </div>
  </div>
</div>

<!-- ══ CONFIRM DIALOG ══════════════════════════════════════ -->
<div class="confirm-bg" id="confirmBg">
  <div class="confirm-box">
    <div class="confirm-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </div>
    <div class="confirm-title">Remover Máquina</div>
    <div class="confirm-msg" id="confirmMsg">Tem certeza? Esta ação não pode ser desfeita.</div>
    <div class="confirm-acts">
      <button class="btn-cancel"      id="confirmCancel">Cancelar</button>
      <button class="btn-del-confirm" id="confirmOk">Remover</button>
    </div>
  </div>
</div>

<script>
/* ── CONFIG ──────────────────────────────────────────────── */
const API = 'https://script.google.com/macros/s/AKfycbzUBhDAvIwVzRWpCZyI_2zRDKvB0VCs0gdosIen6l0_2vqaCUOgjsr97CVoU5ilflLWAg/exec';
const COLS = ['Retornando', 'Disponível', 'Locada'];

/* ── STATE ───────────────────────────────────────────────── */
let machines    = [];
let dragId      = null;
let editingId   = null;
let deleteId    = null;

/* ── API ─────────────────────────────────────────────────── */

// Mapeamento: Apps Script (PT) → Frontend (EN)
const STATUS_PT_TO_EN = { retornando: 'Retornando', disponivel: 'Disponível', locada: 'Locada' };
const STATUS_EN_TO_PT = { 'Retornando': 'retornando', 'Disponível': 'disponivel', 'Locada': 'locada' };
const MANUT_PT_TO_EN = { ok: 'Ok', em_revisao: 'Em revisão', com_defeito: 'Com defeito' };
const MANUT_EN_TO_PT = { 'Ok': 'ok', 'Em revisão': 'em_revisao', 'Com defeito': 'com_defeito' };

function fromSheet(m) {
  return {
    id: m.id,
    name: m.maquina || '',
    column: STATUS_PT_TO_EN[m.status] || 'Disponível',
    currentClient: m.cliente_atual || '',
    nextClient: m.proximo_cliente || '',
    returnDate: m.data_retorno || '',
    nextRentalDate: m.data_proxima_locacao || '',
    maintenanceStatus: MANUT_PT_TO_EN[m.manutencao] || 'Ok'
  };
}

function toSheet(m) {
  return {
    id: m.id,
    maquina: m.name || '',
    status: STATUS_EN_TO_PT[m.column] || 'disponivel',
    cliente_atual: m.currentClient || '',
    proximo_cliente: m.nextClient || '',
    data_retorno: m.returnDate || '',
    data_proxima_locacao: m.nextRentalDate || '',
    manutencao: MANUT_EN_TO_PT[m.maintenanceStatus] || 'ok'
  };
}

async function callApi(body) {
  // Converter machine para formato do Sheets antes de enviar
  if (body.machine) {
    body = { ...body, machine: toSheet(body.machine) };
  }
  const payload = encodeURIComponent(JSON.stringify(body));
  const url = API + '?payload=' + payload + '&_=' + Date.now();
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const txt = await res.text();
    const json = JSON.parse(txt);
    // Converter resposta do Sheets para formato do frontend
    if (json.data && Array.isArray(json.data)) {
      json.data = json.data.map(fromSheet);
    }
    return json;
  } catch(err) {
    console.error('callApi error:', err, 'url:', url);
    throw err;
  }
}

/* ── HELPERS ─────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
  if (!s) return '';
  const p = s.split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : s;
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function mbClass(st) {
  return st === 'Ok' ? 'mb-ok' : st === 'Em revisão' ? 'mb-rev' : 'mb-def';
}

/* ── LOADING / TOAST ─────────────────────────────────────── */
let loadingTimer = null;
function setLoading(on) {
  const bar = document.getElementById('loadingBar');
  const sp  = document.getElementById('spinner');
  if (on) {
    bar.className = 'on';
    sp.className  = 'on';
  } else {
    bar.className = 'done';
    sp.className  = '';
    clearTimeout(loadingTimer);
    loadingTimer = setTimeout(() => { bar.className = ''; }, 400);
  }
}
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3400);
}

/* ── RENDER ──────────────────────────────────────────────── */
function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const m = document.getElementById('filterSel').value;
  return machines.filter(mc => {
    const qs = !q ||
      (mc.name        || '').toLowerCase().includes(q) ||
      (mc.currentClient || '').toLowerCase().includes(q) ||
      (mc.nextClient  || '').toLowerCase().includes(q);
    const ms = !m || mc.maintenanceStatus === m;
    return qs && ms;
  });
}

function render() {
  const list = filtered();
  const defects = machines.filter(m => m.maintenanceStatus === 'Com defeito').length;
  document.getElementById('defectCount').textContent = defects;

  COLS.forEach(col => {
    const items = list.filter(m => m.column === col);
    document.getElementById(`cnt-${col}`).textContent = items.length;
    const body = document.getElementById(`body-${col}`);

    if (!items.length) {
      body.innerHTML = '<div class="col-empty">Nenhuma máquina</div>';
      return;
    }
    body.innerHTML = items.map(cardHTML).join('');
    items.forEach(m => bindCard(body.querySelector(`[data-id="${m.id}"]`), m.id));
  });
}

function cardHTML(m) {
  const st = m.maintenanceStatus || 'Ok';
  return `
<div class="card" data-id="${esc(m.id)}" draggable="true">
  <div class="card-top">
    <div class="card-name">${esc(m.name || '—')}</div>
    <div class="card-btns">
      <button class="cbtn cbtn-edit" onclick="openEdit('${esc(m.id)}')" title="Editar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button class="cbtn cbtn-del" onclick="askDelete('${esc(m.id)}')" title="Remover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>
  </div>
  <span class="mbadge ${mbClass(st)}">${esc(st)}</span>
  <div class="card-grid">
    <div class="cfield">
      <label>Cliente Atual</label>
      <span class="${m.currentClient ? '' : 'nil'}">${esc(m.currentClient || '—')}</span>
    </div>
    <div class="cfield">
      <label>Próximo Cliente</label>
      <span class="${m.nextClient ? '' : 'nil'}">${esc(m.nextClient || '—')}</span>
    </div>
    <div class="cfield">
      <label>Retorno</label>
      <span class="${m.returnDate ? '' : 'nil'}">${m.returnDate ? fmtDate(m.returnDate) : '—'}</span>
    </div>
    <div class="cfield">
      <label>Próx. Locação</label>
      <span class="${m.nextRentalDate ? '' : 'nil'}">${m.nextRentalDate ? fmtDate(m.nextRentalDate) : '—'}</span>
    </div>
  </div>
</div>`;
}

/* ── DRAG & DROP ─────────────────────────────────────────── */
function bindCard(el, id) {
  el.addEventListener('dragstart', e => {
    dragId = id;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragId = null;
  });
}

COLS.forEach(col => {
  const body = document.getElementById(`body-${col}`);
  body.addEventListener('dragover',  e => { e.preventDefault(); body.classList.add('over'); });
  body.addEventListener('dragleave', ()  => body.classList.remove('over'));
  body.addEventListener('drop', async e => {
    e.preventDefault();
    body.classList.remove('over');
    if (!dragId) return;
    const mc = machines.find(m => m.id === dragId);
    if (!mc || mc.column === col) return;
    mc.column = col;
    render();
    setLoading(true);
    try {
      await callApi({ action: 'update', machine: mc });
      toast(`Movida para "${col}"`);
    } catch {
      toast('Erro ao salvar. Tente novamente.', 'err');
    } finally {
      setLoading(false);
    }
  });
});

/* ── MODAL ───────────────────────────────────────────────── */
function openModal(title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editingId = null;
}

function openAdd() {
  editingId = null;
  ['fName','fCurrClient','fNextClient'].forEach(id => document.getElementById(id).value = '');
  ['fReturnDate','fNextRentalDate'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fMaintenance').value = 'Ok';
  document.getElementById('fColumn').value = 'Disponível';
  openModal('Nova Máquina');
}

function openEdit(id) {
  const mc = machines.find(m => m.id === id);
  if (!mc) return;
  editingId = id;
  document.getElementById('fName').value           = mc.name            || '';
  document.getElementById('fCurrClient').value     = mc.currentClient   || '';
  document.getElementById('fNextClient').value     = mc.nextClient      || '';
  document.getElementById('fReturnDate').value     = mc.returnDate      || '';
  document.getElementById('fNextRentalDate').value = mc.nextRentalDate  || '';
  document.getElementById('fMaintenance').value    = mc.maintenanceStatus || 'Ok';
  document.getElementById('fColumn').value         = mc.column          || 'Disponível';
  openModal('Editar Máquina');
}

async function saveMachine() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('Informe o nome da máquina.', 'err'); document.getElementById('fName').focus(); return; }

  const data = {
    name,
    currentClient     : document.getElementById('fCurrClient').value.trim(),
    nextClient        : document.getElementById('fNextClient').value.trim(),
    returnDate        : document.getElementById('fReturnDate').value,
    nextRentalDate    : document.getElementById('fNextRentalDate').value,
    maintenanceStatus : document.getElementById('fMaintenance').value,
    column            : document.getElementById('fColumn').value,
  };

  closeModal();
  setLoading(true);
  try {
    if (editingId) {
      data.id = editingId;
      await callApi({ action: 'update', machine: data });
      toast('Máquina atualizada!');
    } else {
      data.id = uid();
      await callApi({ action: 'add', machine: data });
      toast('Máquina adicionada!');
    }
    // Recarregar tudo do Sheets para garantir sincronização
    await loadAll();
  } catch {
    toast('Erro ao salvar. Tente novamente.', 'err');
  } finally {
    setLoading(false);
  }
}

/* ── DELETE ──────────────────────────────────────────────── */
function askDelete(id) {
  const mc = machines.find(m => m.id === id);
  if (!mc) return;
  deleteId = id;
  document.getElementById('confirmMsg').textContent =
    `Tem certeza que deseja remover "${mc.name}"? Esta ação não pode ser desfeita.`;
  document.getElementById('confirmBg').classList.add('open');
}

async function doDelete() {
  if (!deleteId) return;
  const id = deleteId;
  deleteId = null;
  document.getElementById('confirmBg').classList.remove('open');
  setLoading(true);
  try {
    await callApi({ action: 'delete', id });
    toast('Máquina removida.');
    await loadAll();
  } catch {
    toast('Erro ao remover. Tente novamente.', 'err');
  } finally {
    setLoading(false);
  }
}

/* ── LOAD ALL ────────────────────────────────────────────── */
async function loadAll() {
  setLoading(true);
  try {
    const res = await callApi({ action: 'getAll' });
    machines = Array.isArray(res) ? res
             : Array.isArray(res?.data) ? res.data
             : [];
    render();
  } catch {
    toast('Erro ao carregar dados. Verifique a conexão.', 'err');
  } finally {
    setLoading(false);
  }
}

/* ── EVENTS ──────────────────────────────────────────────── */
document.getElementById('btnAdd').addEventListener('click', openAdd);
document.getElementById('modalX').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalSave').addEventListener('click', saveMachine);
document.getElementById('confirmCancel').addEventListener('click', () => {
  deleteId = null;
  document.getElementById('confirmBg').classList.remove('open');
});
document.getElementById('confirmOk').addEventListener('click', doDelete);
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterSel').addEventListener('change', render);
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});
document.getElementById('confirmBg').addEventListener('click', e => {
  if (e.target === document.getElementById('confirmBg')) {
    deleteId = null;
    document.getElementById('confirmBg').classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    deleteId = null;
    document.getElementById('confirmBg').classList.remove('open');
  }
});

/* ── INIT ────────────────────────────────────────────────── */
loadAll();
</script>
</body>
</html>
