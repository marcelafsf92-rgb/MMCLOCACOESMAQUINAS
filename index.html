<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMC Locações — Painel de Máquinas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1E3A8A;--navy-h:#2348a8;--navy-d:#152d6e;--gold:#F5A623;--gold-h:#f7b844;--bg:#eef2fb;--surface:#fff;--border:#dde4f0;--text:#1a202c;--muted:#6b7280;--sh-s:0 1px 4px rgba(30,58,138,.08);--sh-m:0 4px 16px rgba(30,58,138,.12);--sh-l:0 12px 40px rgba(30,58,138,.20);--r:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    #loadBar{position:fixed;top:0;left:0;width:100%;height:3px;background:var(--gold);z-index:9999;transform:scaleX(0);transform-origin:left;transition:transform .35s;pointer-events:none}
    #loadBar.on{transform:scaleX(.75)}#loadBar.done{transform:scaleX(1);transition:transform .1s}
    #toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;max-width:320px;box-shadow:var(--sh-l);transform:translateY(80px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.ok{background:#d1fae5;color:#065f46;border-left:4px solid #10b981}
    #toast.err{background:#fee2e2;color:#991b1b;border-left:4px solid #ef4444}
    #spin{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(30,58,138,.1);z-index:9998;opacity:0;pointer-events:none;transition:opacity .2s}
    #spin.on{opacity:1;pointer-events:all}
    .sring{width:44px;height:44px;border-radius:50%;border:4px solid rgba(30,58,138,.18);border-top-color:var(--navy);animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .hdr{background:var(--navy);height:68px;padding:0 28px;display:flex;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.22);position:sticky;top:0;z-index:200}
    .hdr-in{width:100%;max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .hdr-brand{display:flex;align-items:center;gap:14px}
    .logo-b{width:44px;height:44px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;color:var(--navy);letter-spacing:1px}
    .br-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#fff;letter-spacing:.4px;line-height:1.1}
    .br-sub{font-size:11.5px;color:rgba(255,255,255,.55)}
    .btn-add{display:flex;align-items:center;gap:7px;background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:10px 20px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.5px;transition:background .18s,transform .1s}
    .btn-add:hover{background:var(--gold-h)}.btn-add:active{transform:scale(.97)}
    .btn-add svg{width:16px;height:16px}
    .tabs{background:var(--surface);border-bottom:2px solid var(--border);padding:0 28px}
    .tabs-in{max-width:1440px;margin:0 auto;display:flex}
    .tbtn{padding:14px 24px;border:none;background:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .18s}
    .tbtn:hover{color:var(--navy)}.tbtn.active{color:var(--navy);border-bottom-color:var(--gold)}
    .tbtn .tc{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:12px;background:var(--navy);color:#fff;font-size:11px;font-weight:600;margin-left:8px}
    .tbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 28px}
    .tbar-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .swrap{position:relative;flex:1;min-width:180px;max-width:340px}
    .swrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);pointer-events:none}
    .sinput{width:100%;padding:8px 12px 8px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none}
    .sinput:focus{border-color:var(--navy)}
    .sel{padding:8px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:'DM Sans',sans-serif;background:var(--bg);cursor:pointer;outline:none}
    .bdef{margin-left:auto;display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:#fee2e2;color:#991b1b;font-size:13px;font-weight:500}
    .bdef .dot{width:8px;height:8px;border-radius:50%;background:#ef4444}
    .bwrap{padding:24px 28px;max-width:1440px;margin:0 auto}
    .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start}
    .tcont{display:none}.tcont.active{display:block}
    .col{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh-s);display:flex;flex-direction:column}
    .ch{padding:15px 18px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .chl{display:flex;align-items:center;gap:9px}
    .cdot{width:11px;height:11px;border-radius:50%}
    .col-ret .cdot{background:#f59e0b}.col-dis .cdot{background:#10b981}.col-tra .cdot{background:#3b82f6}
    .ctitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.6px;text-transform:uppercase;color:var(--navy)}
    .ccnt{background:var(--navy);color:#fff;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:600}
    .cbody{padding:12px 10px;display:flex;flex-direction:column;gap:10px;min-height:80px;border-radius:0 0 var(--r) var(--r);transition:background .18s}
    .cbody.over{background:rgba(30,58,138,.045)}
    .cempty{text-align:center;padding:22px 12px;color:var(--muted);font-size:13px}
    .card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:13px;cursor:grab;transition:box-shadow .18s,border-color .18s,transform .12s;user-select:none}
    .card:hover{box-shadow:var(--sh-m);border-color:var(--navy)}
    .card.dragging{opacity:.45;cursor:grabbing;transform:scale(1.03)}
    .ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
    .cname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:var(--navy);line-height:1.2;flex:1}
    .cbtns{display:flex;gap:4px}
    .cb{width:28px;height:28px;border:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
    .cb svg{width:13px;height:13px}
    .cb-e{background:#eff6ff;color:var(--navy)}.cb-e:hover{background:#dbeafe}
    .cb-d{background:#fff1f2;color:#e11d48}.cb-d:hover{background:#ffe4e6}
    .cb-c{background:#d1fae5;color:#065f46}.cb-c:hover{background:#bbf7d0}
    .mb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:9px}
    .mb::before{content:'';width:7px;height:7px;border-radius:50%}
    .mb-ok{background:#d1fae5;color:#065f46}.mb-ok::before{background:#10b981}
    .mb-rv{background:#fef3c7;color:#92400e}.mb-rv::before{background:#f59e0b}
    .mb-df{background:#fee2e2;color:#991b1b}.mb-df::before{background:#ef4444}
    .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
    .cf label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:1px}
    .cf span{font-size:13px;color:var(--text);font-weight:500}
    .cf span.nil{color:var(--muted);font-style:italic}
    .lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
    .lcard{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:16px;transition:box-shadow .18s}
    .lcard:hover{box-shadow:var(--sh-m)}
    .lacts{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
    .abtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:#fff}
    .abtn svg{width:14px;height:14px}
    .abtn.ret{color:#f59e0b;border-color:#fef3c7;background:#fffbeb}.abtn.ret:hover{background:#fef3c7;border-color:#f59e0b}
    .abtn.ren{color:#3b82f6;border-color:#dbeafe;background:#eff6ff}.abtn.ren:hover{background:#dbeafe;border-color:#3b82f6}
    .abtn.edt{color:var(--navy);border-color:#dde4f0;background:#f8fafc}.abtn.edt:hover{background:#e2e8f0;border-color:var(--navy)}
    .mbg{position:fixed;inset:0;z-index:1000;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .mbg.open{opacity:1;pointer-events:all}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:530px;box-shadow:0 28px 90px rgba(0,0,0,.28);transform:scale(.95) translateY(10px);transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
    .mbg.open .modal{transform:scale(1) translateY(0)}
    .mhd{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
    .mtitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--navy)}
    .mx{width:32px;height:32px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .15s}
    .mx:hover{background:#e2e8f0}.mx svg{width:15px;height:15px}
    .mbd{padding:18px 24px;display:grid;gap:14px}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .fg{display:flex;flex-direction:column;gap:5px}
    .fg label{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .fg input,.fg select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fff;outline:none;transition:border-color .18s}
    .fg input:focus,.fg select:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,138,.10)}
    .mft{padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end}
    .btnc{padding:10px 18px;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
    .btnc:hover{background:#e2e8f0}
    .btns{padding:10px 22px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.5px;cursor:pointer}
    .btns:hover{background:var(--navy-h)}
    .cobg{position:fixed;inset:0;z-index:2000;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .cobg.open{opacity:1;pointer-events:all}
    .cobox{background:#fff;border-radius:14px;padding:24px;max-width:360px;width:100%;box-shadow:0 28px 90px rgba(0,0,0,.28);transform:scale(.95);transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
    .cobg.open .cobox{transform:scale(1)}
    .coicon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .coicon svg{width:24px;height:24px}
    .cotitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;margin-bottom:6px}
    .comsg{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}
    .coacts{display:flex;gap:10px;justify-content:flex-end}
    .cobtn{padding:10px 20px;color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
    @media(max-width:1100px){.board{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.board{grid-template-columns:1fr}.lgrid{grid-template-columns:1fr}}
    @media(max-width:640px){.hdr{padding:0 14px}.tbar{padding:10px 14px}.bwrap{padding:14px}.br-sub{display:none}.bdef{display:none}.tabs{padding:0 14px}}
  </style>
</head>
<body>
<div id="loadBar"></div>
<div id="spin"><div class="sring"></div></div>
<div id="toast"></div>

<header class="hdr"><div class="hdr-in">
  <div class="hdr-brand"><img src="logo.jpg" alt="MMC Locações" style="height:58px;mix-blend-mode:screen;margin:-8px 0;object-fit:contain"><div style="display:flex;flex-direction:column;margin-left:16px;line-height:1.15"><span class="br-name">Controle de Plataformas</span><span class="br-sub" style="font-size:12px">Elevatórias</span></div></div>
  <button class="btn-add" id="btnAdd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova Máquina</button>
</div></header>

<div class="tabs"><div class="tabs-in">
  <button class="tbtn active" data-tab="status" onclick="switchTab('status')">Status <span class="tc" id="tcS">0</span></button>
  <button class="tbtn" data-tab="locadas" onclick="switchTab('locadas')">Locadas <span class="tc" id="tcL">0</span></button>
  <button class="tbtn" data-tab="marcelo" onclick="switchTab('marcelo')">Obras Marcelo <span class="tc" id="tcM">0</span></button>
</div></div>

<div class="tbar"><div class="tbar-in">
  <div class="swrap"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input class="sinput" id="sI" type="text" placeholder="Buscar por nome ou cliente…"></div>
  <select class="sel" id="fS"><option value="">Todas as manutenções</option><option value="Ok - revisada">Ok - revisada</option><option value="Em andamento">Em andamento</option><option value="Com defeito">Com defeito</option></select>
  <div class="bdef"><span class="dot"></span><span id="dC">0</span>&nbsp;com defeito</div>
</div></div>

<div class="tcont active" id="tab-status"><div class="bwrap"><div class="board">
  <div class="col col-ret"><div class="ch"><div class="chl"><div class="cdot"></div><span class="ctitle">Retornando</span></div><span class="ccnt" id="cn-Retornando">0</span></div><div class="cbody" id="bd-Retornando"></div></div>
  <div class="col col-man"><div class="ch"><div class="chl"><div class="cdot"></div><span class="ctitle">Em Manutenção</span></div><span class="ccnt" id="cn-Manutenção">0</span></div><div class="cbody" id="bd-Manutenção"></div></div>
  <div class="col col-dis"><div class="ch"><div class="chl"><div class="cdot"></div><span class="ctitle">Disponível</span></div><span class="ccnt" id="cn-Disponível">0</span></div><div class="cbody" id="bd-Disponível"></div></div>
  <div class="col col-tra"><div class="ch"><div class="chl"><div class="cdot"></div><span class="ctitle">Reservado</span></div><span class="ccnt" id="cn-Reservado">0</span></div><div class="cbody" id="bd-Reservado"></div></div>
</div></div></div>

<div class="tcont" id="tab-locadas"><div class="bwrap"><div class="lgrid" id="lGrid"></div></div></div>

<div class="tcont" id="tab-marcelo"><div class="bwrap"><div class="lgrid" id="mGrid"></div></div></div>

<div class="mbg" id="mBg"><div class="modal"><div class="mhd"><span class="mtitle" id="mT">Nova Máquina</span><button class="mx" id="mX"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
<div class="mbd">
  <div class="frow"><div class="fg"><label>Modelo *</label><input id="fModelo" type="text" placeholder="Ex: Tesoura 26m"></div><div class="fg"><label>Nº Série *</label><input id="fSerie" type="text" placeholder="Ex: 916946"></div></div>
      <div class="frow"><div class="fg"><label>Marca</label><select id="fMarca"><option value="">Selecione...</option><option value="JLG">JLG</option><option value="Haulotte">Haulotte</option><option value="Genie">Genie</option><option value="Manitou">Manitou</option><option value="Outra">Outra</option></select></div><div class="fg"><label>Nome / apelido</label><input id="fN" type="text" placeholder="Ex: Plataforma Tesoura 8m"></div></div>
  <div class="frow"><div class="fg"><label>Cliente Atual</label><input id="fCC" type="text" placeholder="Nome do cliente"></div><div class="fg"><label>Próximo Cliente</label><input id="fNC" type="text" placeholder="Próximo cliente"></div></div>
  <div class="fg"><label>Data da Locação</label><input id="fDL" type="date"></div>
      <div class="frow"><div class="fg"><label>Data de Retorno</label><input id="fDR" type="date"></div><div class="fg"><label>Data Próxima Locação</label><input id="fDN" type="date"></div></div>
  <div class="frow"><div class="fg"><label>Manutenção</label><select id="fM"><option value="Ok - revisada">Ok - revisada</option><option value="Em andamento">Em andamento</option><option value="Com defeito">Com defeito</option></select></div><div class="fg"><label>Coluna</label><select id="fCol"><option value="Retornando">Retornando</option><option value="Manutenção">Em Manutenção</option><option value="Disponível">Disponível</option><option value="Reservado">Reservado</option><option value="Locada">Locada</option></select></div></div>
</div>
<div class="mft"><button class="btnc" id="mC">Cancelar</button><button class="btns" id="mS">Salvar</button></div></div></div>

<div class="mbg" id="rBg"><div class="modal"><div class="mhd"><span class="mtitle">Renovar Contrato</span><button class="mx" onclick="closeR()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
<div class="mbd">
  <div class="fg"><label>Máquina</label><input id="rN" type="text" disabled></div>
  <div class="fg"><label>Cliente</label><input id="rC" type="text" placeholder="Mesmo ou novo cliente"></div>
  <div class="frow"><div class="fg"><label>Nova Data Início</label><input id="rDS" type="date"></div><div class="fg"><label>Nova Data Fim</label><input id="rDE" type="date"></div></div>
</div>
<div class="mft"><button class="btnc" onclick="closeR()">Cancelar</button><button class="btns" onclick="doR()">Renovar</button></div></div></div>

<div class="cobg" id="cBg"><div class="cobox">
  <div class="coicon" id="cIcon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></div>
  <div class="cotitle" id="cT">Confirmar</div>
  <div class="comsg" id="cM">Tem certeza?</div>
  <div class="coacts"><button class="btnc" id="cCancel">Cancelar</button><button class="cobtn" id="cOk">Confirmar</button></div>
</div></div>

<script>
const API='https://script.google.com/macros/s/AKfycbzUBhDAvIwVzRWpCZyI_2zRDKvB0VCs0gdosIen6l0_2vqaCUOgjsr97CVoU5ilflLWAg/exec';
const SCOLS=['Retornando','Manutenção','Disponível','Reservado'];
let M=[],dragId=null,editId=null,cAction=null,rId=null,curTab='status';
const S2E={retornando:'Retornando',manutencao:'Manutenção',disponivel:'Disponível',reservado:'Reservado',locada:'Locada'};
const E2S={};Object.entries(S2E).forEach(([k,v])=>E2S[v]=k);
const M2E={ok_revisada:'Ok - revisada',em_andamento:'Em andamento',com_defeito:'Com defeito'};
const E2M={};Object.entries(M2E).forEach(([k,v])=>E2M[v]=k);
const MARCA_LOGO={'JLG':'logo-jlg.png','Haulotte':'logo-haulotte.png','Genie':'logo-genie.png','Manitou':'logo-manitou.png'};
const MARCA_BG={'JLG':'#F26522','Haulotte':'#1a1a1a','Genie':'#0057A0','Manitou':'#CC0000'};
function marcaHTML(marca){const logo=MARCA_LOGO[marca];const bg=MARCA_BG[marca]||'#666';if(logo)return '<img src="'+logo+'" alt="'+esc(marca)+'" style="height:28px;object-fit:contain;max-width:60px">';return '<span style="color:#fff;font-size:9px;font-weight:500;letter-spacing:.5px">'+esc(marca||'?')+'</span>'}
function marcaBadge(marca){const bg=MARCA_BG[marca]||'#666';return '<div style="width:68px;height:36px;border-radius:6px;background:'+bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:4px">'+marcaHTML(marca)+'</div>'}
function fromS(m){return{id:m.id,name:m.maquina||'',column:S2E[m.status]||'Disponível',cc:m.cliente_atual||'',nc:m.proximo_cliente||'',dr:m.data_retorno||'',dn:m.data_proxima_locacao||'',dl:m.data_locacao||'',ms:M2E[m.manutencao]||'Ok - revisada',modelo:m.modelo||'',serie:m.numero_serie||'',marca:m.marca||''}}
function toS(m){return{id:m.id,maquina:m.name||'',status:E2S[m.column]||'disponivel',cliente_atual:m.cc||'',proximo_cliente:m.nc||'',data_retorno:m.dr||'',data_proxima_locacao:m.dn||'',data_locacao:m.dl||'',manutencao:E2M[m.ms]||'ok',modelo:m.modelo||'',numero_serie:m.serie||'',marca:m.marca||''}}
async function api(body){if(body.machine)body={...body,machine:toS(body.machine)};const u=API+'?payload='+encodeURIComponent(JSON.stringify(body))+'&_='+Date.now();const r=await fetch(u);if(!r.ok)throw new Error('HTTP '+r.status);const j=JSON.parse(await r.text());if(j.data&&Array.isArray(j.data))j.data=j.data.map(fromS);return j}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fd(s){if(!s)return'';try{if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0]}const d=new Date(s);if(!isNaN(d)){const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=d.getFullYear();return dd+'/'+mm+'/'+yy}return s.replace(/\s+\d{2}:\d{2}:\d{2}.*/,'')}catch{return s}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function mc(s){return s==='Ok - revisada'?'mb-ok':s==='Em andamento'?'mb-prog':s==='Com defeito'?'mb-df':'mb-ok'}
let lt=null;
function sL(on){const b=document.getElementById('loadBar'),s=document.getElementById('spin');if(on){b.className='on';s.className='on'}else{b.className='done';s.className='';clearTimeout(lt);lt=setTimeout(()=>b.className='',400)}}
function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.className='show '+t;setTimeout(()=>e.classList.remove('show'),3400)}
function switchTab(t){curTab=t;document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.tcont').forEach(c=>c.classList.toggle('active',c.id==='tab-'+t));render()}
function filt(list){const q=document.getElementById('sI').value.toLowerCase().trim(),m=document.getElementById('fS').value;return list.filter(x=>{const qs=!q||(x.name||'').toLowerCase().includes(q)||(x.cc||'').toLowerCase().includes(q)||(x.nc||'').toLowerCase().includes(q)||(x.modelo||'').toLowerCase().includes(q)||(x.serie||'').toLowerCase().includes(q)||(x.marca||'').toLowerCase().includes(q);const ms=!m||x.ms===m;return qs&&ms})}
function isMarcelo(m){const c=((m.cc||'')+' '+(m.nc||'')).toLowerCase();return c.includes('marcelo')&&c.includes('obra')}
function render(){
  const marc=M.filter(m=>isMarcelo(m));
  const locRetornando=M.filter(m=>m.column==='Locada'&&!isMarcelo(m)&&m.dr).map(m=>({...m,column:'Retornando',_espelho:true}));
  const sm=[...M.filter(m=>m.column!=='Locada'&&!isMarcelo(m)),...locRetornando],lm=M.filter(m=>m.column==='Locada'&&!isMarcelo(m));
  document.getElementById('dC').textContent=M.filter(m=>m.ms==='Com defeito').length;
  document.getElementById('tcS').textContent=sm.length;
  document.getElementById('tcL').textContent=lm.length;
  document.getElementById('tcM').textContent=marc.length;
  const sf=filt(sm);
  SCOLS.forEach(col=>{const items=sf.filter(m=>m.column===col);document.getElementById('cn-'+col).textContent=items.length;const bd=document.getElementById('bd-'+col);if(!items.length){bd.innerHTML='<div class="cempty">Nenhuma máquina</div>';return}bd.innerHTML=items.map(m=>cardH(m,col==='Reservado')).join('');items.forEach(m=>bindD(bd.querySelector('[data-id="'+m.id+'"]'),m.id))});
  const lf=filt(lm),g=document.getElementById('lGrid');
  if(!lf.length){g.innerHTML='<div class="cempty" style="grid-column:1/-1;padding:40px">Nenhuma máquina locada</div>'}
  else{g.innerHTML=lf.map(locH).join('')}
  const mf=filt(marc),mg=document.getElementById('mGrid');
  if(!mf.length){mg.innerHTML='<div class="cempty" style="grid-column:1/-1;padding:40px">Nenhuma máquina nas obras do Marcelo</div>'}
  else{mg.innerHTML=mf.map(marcH).join('')}
}
function cardH(m,showC){
  const espelho=m._espelho?'<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:#dbeafe;color:#1e40af;margin-left:6px">Locada</span>':'';
  const cardTitle=m.modelo?esc(m.modelo):(esc(m.name||'—'));
  const cb=showC?'<button class="cb cb-c" onclick="event.stopPropagation();cEnt(\''+esc(m.id)+'\')" title="Confirmar Entrega"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>':'';
  return '<div class="card" data-id="'+esc(m.id)+'" draggable="true"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+(m.marca?marcaBadge(m.marca):'')+'<div style="flex:1;min-width:0"><div class="cname">'+cardTitle+espelho+'</div>'+(m.serie?'<div style="font-size:11px;color:var(--muted)">Série: '+esc(m.serie)+'</div>':'')+'</div><div class="cbtns">'+cb+'<button class="cb cb-e" onclick="event.stopPropagation();oEdit(\''+esc(m.id)+'\')" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="cb cb-d" onclick="event.stopPropagation();aDel(\''+esc(m.id)+'\')" title="Remover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div></div>'+manutBadge+'<div class="cgrid"><div class="cf"><label>Cliente Atual</label><span class="'+(m.cc?'':'nil')+'">'+esc(m.cc||'—')+'</span></div><div class="cf"><label>Próximo Cliente</label><span class="'+(m.nc?'':'nil')+'">'+esc(m.nc||'—')+'</span></div><div class="cf"><label>Retorno</label><span class="'+(m.dr?'':'nil')+'">'+(m.dr?fd(m.dr):'—')+'</span></div><div class="cf"><label>Próx. Locação</label><span class="'+(m.dn?'':'nil')+'">'+(m.dn?fd(m.dn):'—')+'</span></div></div></div>'}
function locH(m){
  const locTitle=m.modelo?esc(m.modelo):(esc(m.name||'—'));
  return '<div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+(m.marca?marcaBadge(m.marca):'')+'<div style="flex:1"><div class="cname">'+locTitle+'</div>'+(m.serie?'<div style="font-size:11px;color:var(--muted)">Série: '+esc(m.serie)+'</div>':'')+'</div><span class="mb '+mc(m.ms)+'">'+esc(m.ms)+'</span></div>'+'<div class="cgrid"><div class="cf"><label>Cliente</label><span>'+esc(m.cc||'—')+'</span></div><div class="cf"><label>Manutenção</label><span>'+esc(m.ms)+'</span></div><div class="cf"><label>Data Locação</label><span>'+(m.dl?fd(m.dl):'—')+'</span></div><div class="cf"><label>Retorno Previsto</label><span class="'+(m.dr?'':'nil')+'">'+(m.dr?fd(m.dr):'—')+'</span></div></div><div class="cgrid" style="margin-top:6px"><div class="cf"><label>Próx. Locação</label><span class="'+(m.dn?'':'nil')+'">'+(m.dn?fd(m.dn):'—')+'</span></div><div class="cf"></div></div><div class="lacts"><button class="abtn ret" onclick="iRet(\''+esc(m.id)+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Retorno</button><button class="abtn ren" onclick="oRen(\''+esc(m.id)+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>Renovar</button><button class="abtn edt" onclick="oEdit(\''+esc(m.id)+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar</button></div></div>'}
function marcH(m){
  const mTitle=m.modelo?esc(m.modelo):(esc(m.name||'—'));
  return '<div class="lcard" style="border-left:3px solid var(--gold)"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+(m.marca?marcaBadge(m.marca):'')+'<div style="flex:1"><div class="cname">'+mTitle+'</div>'+(m.serie?'<div style="font-size:11px;color:var(--muted)">Série: '+esc(m.serie)+'</div>':'')+'</div><span class="mb '+mc(m.ms)+'">'+esc(m.ms)+'</span></div>'+'<div class="cgrid"><div class="cf"><label>Obra / Cliente</label><span>'+esc(m.cc||'—')+'</span></div><div class="cf"><label>Status</label><span>'+esc(m.column)+'</span></div><div class="cf"><label>Data Locação</label><span>'+(m.dn?fd(m.dn):'—')+'</span></div><div class="cf"><label>Retorno Previsto</label><span class="'+(m.dr?'':'nil')+'">'+(m.dr?fd(m.dr):'—')+'</span></div></div><div class="lacts"><button class="abtn ret" onclick="iRetM(\''+esc(m.id)+'\')" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Retorno</button><button class="abtn ren" onclick="oRen(\''+esc(m.id)+'\')" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>Renovar</button><button class="abtn edt" onclick="oEdit(\''+esc(m.id)+'\')" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar</button></div></div>'}
function bindD(el,id){el.addEventListener('dragstart',e=>{dragId=id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move'});el.addEventListener('dragend',()=>{el.classList.remove('dragging');dragId=null})}
let dropping=false;
SCOLS.forEach(col=>{const bd=document.getElementById('bd-'+col);bd.addEventListener('dragover',e=>{e.preventDefault();bd.classList.add('over')});bd.addEventListener('dragleave',()=>bd.classList.remove('over'));bd.addEventListener('drop',async e=>{e.preventDefault();bd.classList.remove('over');if(!dragId||dropping)return;const mid=dragId;dragId=null;dropping=true;const m=M.find(x=>x.id===mid);if(!m||m.column===col){dropping=false;return}const old=m.column;m.column=col;render();sL(true);try{await api({action:'update',machine:m});toast('Movida para "'+col+'"');await loadAll()}catch(er){console.error(er);m.column=old;render();toast('Erro ao salvar.','err')}finally{sL(false);dropping=false}})});
function showCo(title,msg,btnText,btnColor,iconBg,action){cAction=action;document.getElementById('cT').textContent=title;document.getElementById('cM').textContent=msg;document.getElementById('cOk').textContent=btnText;document.getElementById('cOk').style.background=btnColor;document.getElementById('cIcon').style.background=iconBg;document.getElementById('cBg').classList.add('open')}
function closeCo(){cAction=null;document.getElementById('cBg').classList.remove('open')}
function cEnt(id){const m=M.find(x=>x.id===id);if(!m)return;showCo('Confirmar Entrega','Confirmar que "'+m.name+'" foi entregue ao cliente? Ela será movida para a aba Locadas.','Confirmar','#10b981','#d1fae5',async()=>{sL(true);try{m.column='Locada';await api({action:'update',machine:m});toast(m.name+' — Entrega confirmada!');await loadAll()}catch{toast('Erro.','err')}finally{sL(false)}})}
function iRet(id){const m=M.find(x=>x.id===id);if(!m)return;showCo('Iniciar Retorno','Iniciar retorno de "'+m.name+'"? Voltará para Status > Retornando.','Iniciar Retorno','#f59e0b','#fef3c7',async()=>{sL(true);try{m.column='Retornando';await api({action:'update',machine:m});toast(m.name+' — Retorno iniciado!');await loadAll();switchTab('status')}catch{toast('Erro.','err')}finally{sL(false)}})}
function iRetM(id){const m=M.find(x=>x.id===id);if(!m)return;showCo('Retorno da Obra','Iniciar retorno de "'+m.name+'" da obra do Marcelo? O campo cliente será limpo e ela voltará para Status > Retornando.','Iniciar Retorno','#f59e0b','#fef3c7',async()=>{sL(true);try{m.column='Retornando';m.cc='';m.nc='';await api({action:'update',machine:m});toast(m.name+' — Retorno da obra iniciado!');await loadAll();switchTab('status')}catch{toast('Erro.','err')}finally{sL(false)}})}
function aDel(id){const m=M.find(x=>x.id===id);if(!m)return;showCo('Remover Máquina','Remover "'+m.name+'"? Esta ação não pode ser desfeita.','Remover','#ef4444','#fee2e2',async()=>{sL(true);try{await api({action:'delete',id});toast('Máquina removida.');await loadAll()}catch{toast('Erro.','err')}finally{sL(false)}})}
function oRen(id){const m=M.find(x=>x.id===id);if(!m)return;rId=id;document.getElementById('rN').value=m.name;document.getElementById('rC').value=m.cc||'';document.getElementById('rDS').value='';document.getElementById('rDE').value='';document.getElementById('rBg').classList.add('open')}
function closeR(){document.getElementById('rBg').classList.remove('open');rId=null}
async function doR(){const m=M.find(x=>x.id===rId);if(!m)return;const c=document.getElementById('rC').value.trim();if(!c){toast('Informe o cliente.','err');return}m.cc=c;const ds=document.getElementById('rDS').value,de=document.getElementById('rDE').value;if(ds)m.dn=ds;if(de)m.dr=de;closeR();sL(true);try{await api({action:'update',machine:m});toast(m.name+' — Contrato renovado!');await loadAll()}catch{toast('Erro.','err')}finally{sL(false)}}
function oModal(t){document.getElementById('mT').textContent=t;document.getElementById('mBg').classList.add('open');setTimeout(()=>document.getElementById('fN').focus(),50)}
function cModal(){document.getElementById('mBg').classList.remove('open');editId=null}
function oAdd(){editId=null;['fN','fCC','fNC','fModelo','fSerie'].forEach(i=>document.getElementById(i).value='');document.getElementById('fMarca').value='';['fDL','fDR','fDN'].forEach(i=>document.getElementById(i).value='');document.getElementById('fM').value='Ok - revisada';document.getElementById('fCol').value='Disponível';oModal('Nova Máquina')}
function oEdit(id){const m=M.find(x=>x.id===id);if(!m)return;editId=id;document.getElementById('fModelo').value=m.modelo||'';document.getElementById('fSerie').value=m.serie||'';document.getElementById('fMarca').value=m.marca||'';document.getElementById('fN').value=m.name||'';document.getElementById('fCC').value=m.cc||'';document.getElementById('fNC').value=m.nc||'';document.getElementById('fDL').value=m.dl||'';document.getElementById('fDR').value=m.dr||'';document.getElementById('fDN').value=m.dn||'';document.getElementById('fM').value=m.ms||'Ok';document.getElementById('fCol').value=m.column||'Disponível';oModal('Editar Máquina')}
async function save(){const n=document.getElementById('fN').value.trim();const mod=document.getElementById('fModelo').value.trim();const ser=document.getElementById('fSerie').value.trim();if(!mod&&!n){toast('Informe o modelo ou nome da máquina.','err');return}const d={name:n,modelo:document.getElementById('fModelo').value.trim(),serie:document.getElementById('fSerie').value.trim(),marca:document.getElementById('fMarca').value,cc:document.getElementById('fCC').value.trim(),nc:document.getElementById('fNC').value.trim(),dl:document.getElementById('fDL').value,dr:document.getElementById('fDR').value,dn:document.getElementById('fDN').value,ms:document.getElementById('fM').value,column:document.getElementById('fCol').value};const eid=editId;cModal();sL(true);try{if(eid){d.id=eid;await api({action:'update',machine:d});toast('Atualizada!')}else{d.id=uid();await api({action:'add',machine:d});toast('Adicionada!')}await loadAll()}catch{toast('Erro ao salvar.','err')}finally{sL(false)}}
async function loadAll(){sL(true);try{const r=await api({action:'getAll'});M=Array.isArray(r)?r:Array.isArray(r?.data)?r.data:[];render()}catch{toast('Erro ao carregar.','err')}finally{sL(false)}}
document.getElementById('btnAdd').addEventListener('click',oAdd);
document.getElementById('mX').addEventListener('click',cModal);
document.getElementById('mC').addEventListener('click',cModal);
document.getElementById('mS').addEventListener('click',save);
document.getElementById('cCancel').addEventListener('click',closeCo);
document.getElementById('cOk').addEventListener('click',()=>{const fn=cAction;closeCo();if(fn){fn()}});
document.getElementById('sI').addEventListener('input',render);
document.getElementById('fS').addEventListener('change',render);
document.getElementById('mBg').addEventListener('click',e=>{if(e.target===document.getElementById('mBg'))cModal()});
document.getElementById('rBg').addEventListener('click',e=>{if(e.target===document.getElementById('rBg'))closeR()});
document.getElementById('cBg').addEventListener('click',e=>{if(e.target===document.getElementById('cBg'))closeCo()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){cModal();closeR();closeCo()}});
loadAll();
</script>
</body>
</html>
